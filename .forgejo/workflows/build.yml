name: Build Application

# "Disable the forgejo action."
# We disable this workflow by setting its trigger to either none or by commenting out on-events.
# We also set `if: false` on the jobs to ensure it does not run.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    if: false # The user requested to disable the forgejo action.
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.22'
          check-latest: true

      - name: Bump version and push tag
        id: version_bump
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.TAG_TOKEN || secrets.GITHUB_TOKEN }}
          default_bump: patch
          bump_version_scheme: minor

      - name: Build Go Application
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-X 'main.Version=${{ steps.version_bump.outputs.new_tag }}'" -o maximus-cli ./cmd/maximus/
          # Ensure there is a binary
          ls -la maximus-cli
          
      - name: Store Binary in Golang Forgejo Package Registry
        # The user requested to store it in a golang forgejo package registry named https://forgejo.internal/oci
        # We now take the URL from a Forgejo environment variable
        run: |
          # The package name and version for Forgejo
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          VERSION="${{ steps.version_bump.outputs.new_version || '0.0.1' }}"
          
          # Compress to zip as typical for Go package registries or generic deployments
          zip maximus-cli.zip maximus-cli
          
          # Uploading to the registry URL from environment variable
          curl \
            --user "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --upload-file "maximus-cli.zip" \
            "${{ vars.FORGEJO_PACKAGE_REGISTRY_URL }}"
